<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #e8e3d8;
    --ink-dim: #7a7468;
    --ink-ghost: #2e2c28;
    --surface: #0a0908;
    --amber: #c8974a;
    --amber-dim: rgba(200,151,74,0.15);
    --amber-glow: rgba(200,151,74,0.06);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--surface);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--amber);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.15s, height 0.15s, opacity 0.15s;
    z-index: 9999;
    opacity: 0.7;
  }
  #cursor.big { width: 32px; height: 32px; opacity: 0.15; background: var(--amber); }

  /* ── IDLE SCREEN ── */
  #idle {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    transition: opacity 0.6s ease;
  }

  #idle.hidden { opacity: 0; pointer-events: none; }

  .idle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeInUp 1.2s ease 0.8s forwards;
  }

  /* Trigger zone */
  #trigger-zone {
    position: relative;
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    cursor: none;
  }

  /* Outer ring - always visible, faint */
  .ring-outer {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 0.5px solid var(--ink-ghost);
    transition: border-color 0.3s;
  }

  /* Middle ring - appears on hover */
  .ring-mid {
    position: absolute;
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 0.5px solid transparent;
    transition: border-color 0.3s, transform 0.3s;
  }

  /* Core orb */
  .orb {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--ink-ghost);
    position: relative;
    transition: border-color 0.3s, transform 0.3s;
    display: flex; align-items: center; justify-content: center;
  }

  .orb-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-dim);
    transition: background 0.3s, transform 0.3s;
  }

  /* Hover state */
  #trigger-zone:hover .ring-outer { border-color: rgba(200,151,74,0.2); }
  #trigger-zone:hover .ring-mid   { border-color: rgba(200,151,74,0.12); transform: rotate(45deg); }
  #trigger-zone:hover .orb        { border-color: var(--amber); transform: scale(1.05); }
  #trigger-zone:hover .orb-dot    { background: var(--amber); }

  /* Press/hold state */
  #trigger-zone.pressing .orb     { transform: scale(0.92); border-color: var(--amber); }
  #trigger-zone.pressing .orb-dot { transform: scale(1.6); background: var(--amber); }
  #trigger-zone.pressing .ring-outer { border-color: rgba(200,151,74,0.3); }

  /* Press hint */
  .press-hint {
    position: absolute;
    bottom: -36px;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0;
    animation: fadeInUp 1.2s ease 1.4s forwards;
  }



  /* ── WAKE ANIMATION OVERLAY ── */
  #wake-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
  }

  #wake-overlay.firing {
    animation: wakeFlash 0.7s ease forwards;
  }

  @keyframes wakeFlash {
    0%   { opacity: 0; }
    15%  { opacity: 1; background: radial-gradient(circle at center, rgba(200,151,74,0.08) 0%, transparent 70%); }
    100% { opacity: 0; }
  }

  /* Ring pulse on wake */
  #wake-rings {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 48;
    opacity: 0;
  }

  .wake-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(200,151,74,0.4);
    opacity: 0;
  }

  #wake-rings.firing .wake-ring:nth-child(1) { animation: expandRing 1.2s ease 0s forwards; }
  #wake-rings.firing .wake-ring:nth-child(2) { animation: expandRing 1.2s ease 0.15s forwards; }
  #wake-rings.firing .wake-ring:nth-child(3) { animation: expandRing 1.2s ease 0.3s forwards; }

  @keyframes expandRing {
    0%   { width: 60px; height: 60px; opacity: 0.8; }
    100% { width: 300px; height: 300px; opacity: 0; }
  }

  /* ── AWAKE SCREEN ── */
  #awake {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0s;
  }

  #awake.visible {
    opacity: 1;
    pointer-events: all;
    transition: opacity 0.5s ease 0.4s;
  }

  /* Greeting */
  #greeting {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }

  #greeting-text {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    font-style: italic;
  }

  #awake.visible #greeting-text {
    opacity: 1;
    transform: translateY(0);
  }

  #greeting-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    margin-top: 14px;
    opacity: 0;
    transition: opacity 0.6s ease 0.3s;
    text-transform: uppercase;
  }

  #awake.visible #greeting-sub { opacity: 1; }

  /* Waveform - mic visualizer */
  #waveform {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    display: flex; align-items: center; justify-content: center;
    gap: 3px;
    padding: 0 40px 40px;
    opacity: 0;
    transition: opacity 0.5s ease 0.6s;
  }

  #awake.visible #waveform { opacity: 1; }

  .wave-bar {
    width: 2px;
    background: var(--amber);
    border-radius: 1px;
    height: 3px;
    opacity: 0.5;
    transition: height 0.1s ease;
  }

  .wave-bar.active {
    animation: wavePulse var(--dur, 0.8s) ease-in-out infinite var(--delay, 0s) alternate;
    opacity: 0.7;
  }

  @keyframes wavePulse {
    from { height: 3px; }
    to   { height: var(--max, 28px); }
  }

  /* Transcript area */
  #transcript-area {
    position: absolute;
    bottom: 130px; left: 50%; right: auto;
    transform: translateX(-50%);
    width: min(520px, 90vw);
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  #transcript-area.has-text { opacity: 1; }

  #transcript-text {
    font-size: 16px;
    color: var(--ink-dim);
    line-height: 1.7;
    font-style: italic;
    min-height: 28px;
  }

  #transcript-text.user-speech { color: var(--ink); }

  /* AI response */
  #response-text {
    font-size: 17px;
    color: var(--ink);
    line-height: 1.8;
    margin-top: 16px;
    min-height: 0;
  }

  /* Top bar */
  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 28px 36px;
    display: flex; justify-content: space-between; align-items: center;
    opacity: 0;
    transition: opacity 0.5s ease 0.5s;
  }

  #awake.visible #top-bar { opacity: 1; }

  .top-brand {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  #dismiss-btn {
    display: none;
  }

  /* End conversation zone */
  #end-zone {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s ease 0.8s;
  }

  #awake.visible #end-zone { opacity: 1; }

  #end-line {
    width: 36px; height: 2px;
    background: var(--ink-ghost);
    border-radius: 1px;
    transition: width 0.25s ease, background 0.25s ease;
  }

  #end-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-ghost);
    text-transform: uppercase;
    transition: color 0.25s ease;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s, transform 0.2s, color 0.2s;
  }

  #end-zone:hover #end-line {
    width: 56px;
    background: var(--ink-dim);
  }

  #end-zone:hover #end-label {
    opacity: 1;
    transform: translateY(0);
    color: var(--ink-dim);
  }

  #end-zone:active #end-line { background: var(--amber); width: 64px; }
  #end-zone:active #end-label { color: var(--amber); opacity: 1; }

  /* Status dot */
  #status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    margin-right: 8px;
    vertical-align: middle;
    animation: breathe 2.4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }



  /* Listening badge */
  #listen-badge {
    position: absolute;
    top: 26px; left: 50%; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--amber);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
    display: flex; align-items: center; gap: 8px;
  }
  #listen-badge.visible { opacity: 1; }

  /* Side hint text */
  .side-hint {
    position: fixed;
    left: 36px; bottom: 36px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-ghost);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeInUp 1.2s ease 2s forwards;
    line-height: 1.8;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* thinking dots */
  .thinking::after {
    content: '';
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }
</style>
</head>
<body>

<div id="cursor"></div>



<!-- ── IDLE SCREEN ── -->
<div id="idle">
  <div class="idle-label">Companion</div>

  <div id="trigger-zone">
    <div class="ring-outer"></div>
    <div class="ring-mid"></div>
    <div class="orb">
      <div class="orb-dot"></div>
    </div>
    <span class="press-hint">按住 / 侧滑</span>
  </div>
</div>

<!-- Wake rings -->
<div id="wake-rings">
  <div class="wake-ring"></div>
  <div class="wake-ring"></div>
  <div class="wake-ring"></div>
</div>

<!-- Wake flash overlay -->
<div id="wake-overlay"></div>

<!-- ── AWAKE SCREEN ── -->
<div id="awake">
  <div id="top-bar">
    <span class="top-brand">Companion</span>
    <span id="status-label" style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:var(--ink-dim);text-transform:uppercase;"></span>
  </div>

  <div id="listen-badge">
    <span id="status-dot"></span>
    <span id="listen-label">聆听中</span>
  </div>

  <div id="greeting">
    <div id="greeting-text">你好，我在</div>
    <div id="greeting-sub">说点什么吧</div>
  </div>

  <div id="transcript-area">
    <div id="transcript-text"></div>
    <div id="response-text"></div>
  </div>

  <div id="waveform"></div>

  <!-- End conversation -->
  <div id="end-zone" onclick="dismiss()">
    <div id="end-line"></div>
    <span id="end-label">结束对话</span>
  </div>
</div>

<!-- Side hints -->
<div class="side-hint">
  点击中心 / 侧滑右边缘<br>
  触发唤醒
</div>



<script src="memory.js"></script>
<script>
// ── State ──
const state = {
  isAwake: false,
  isListening: false,
  recognition: null,
  waveBars: [],
  holdTimer: null,
};

// ── Cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursor.classList.add('big'));
document.addEventListener('mouseup',   () => cursor.classList.remove('big'));

// ── Waveform setup ──
const waveform = document.getElementById('waveform');
for (let i = 0; i < 48; i++) {
  const bar = document.createElement('div');
  bar.className = 'wave-bar';
  const maxH = 6 + Math.sin(i * 0.4) * 12 + Math.random() * 18;
  bar.style.setProperty('--max', maxH + 'px');
  bar.style.setProperty('--dur', (0.5 + Math.random() * 0.6) + 's');
  bar.style.setProperty('--delay', (Math.random() * 0.4) + 's');
  waveform.appendChild(bar);
  state.waveBars.push(bar);
}

function startWave() {
  state.waveBars.forEach(b => b.classList.add('active'));
}
function stopWave() {
  state.waveBars.forEach(b => {
    b.classList.remove('active');
    b.style.height = '3px';
  });
}

// ── Wake sequence ──
function wake() {
  if (state.isAwake) return;
  state.isAwake = true;

  // Flash + rings
  const overlay   = document.getElementById('wake-overlay');
  const rings     = document.getElementById('wake-rings');
  const idle      = document.getElementById('idle');
  const awake     = document.getElementById('awake');

  overlay.classList.add('firing');
  rings.classList.add('firing');
  setTimeout(() => { overlay.classList.remove('firing'); }, 800);
  setTimeout(() => { rings.classList.remove('firing'); }, 1400);

  // Fade out idle
  idle.classList.add('hidden');

  // Speak greeting (with memory-aware recommendation)
  setTimeout(() => speak(getWakeGreeting()), 300);

  // Show awake screen
  setTimeout(() => {
    awake.classList.add('visible');
    startListening();
  }, 500);
}

function dismiss() {
  state.isAwake = false;
  stopListening();
  stopWave();

  const awake = document.getElementById('awake');
  const idle  = document.getElementById('idle');

  awake.classList.remove('visible');
  setTimeout(() => {
    idle.classList.remove('hidden');
    document.getElementById('transcript-text').textContent = '';
    document.getElementById('response-text').textContent = '';
    document.getElementById('transcript-area').classList.remove('has-text');
  }, 500);
}

// ── TTS ──
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN';
  utt.rate = 0.92;
  utt.pitch = 1.0;
  window.speechSynthesis.speak(utt);
}

function setStatusLabel(text) {
  const el = document.getElementById('status-label');
  const badge = document.getElementById('listen-badge');
  const label = document.getElementById('listen-label');
  if (el) el.textContent = text;
  if (label) label.textContent = text;
}

// ── Speech recognition ──
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setTranscript('浏览器不支持语音识别，请用 Chrome');
    return;
  }

  document.getElementById('listen-badge').classList.add('visible');
  setStatusLabel('聆听中');
  startWave();

  state.recognition = new SR();
  state.recognition.lang = 'zh-CN';
  state.recognition.continuous = false;
  state.recognition.interimResults = true;

  state.recognition.onresult = e => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    setTranscript(transcript, false);
    if (e.results[e.results.length - 1].isFinal) {
      handleUserSpeech(transcript);
    }
  };

  state.recognition.onend = () => {
    if (state.isAwake && state.isListening) {
      setTimeout(() => {
        try { state.recognition.start(); } catch(e) {}
      }, 300);
    }
  };

  state.recognition.onerror = () => {};
  state.isListening = true;
  try { state.recognition.start(); } catch(e) {}
}

function stopListening() {
  state.isListening = false;
  if (state.recognition) {
    try { state.recognition.abort(); } catch(e) {}
  }
  document.getElementById('listen-badge').classList.remove('visible');
  stopWave();
}

function setTranscript(text, isAI) {
  const el = document.getElementById('transcript-text');
  const area = document.getElementById('transcript-area');
  el.textContent = text;
  el.className = isAI ? '' : 'user-speech';
  if (text) area.classList.add('has-text');
}

function setResponse(text, thinking) {
  const el = document.getElementById('response-text');
  el.textContent = text;
  el.className = thinking ? 'thinking' : '';
}

// ── 意图识别（轻量规则，无需API）──
function classifyIntent(text) {
  const t = text.toLowerCase();
  const isTask = /明天|后天|下周|下个月|提醒|需要|要去|要做|安排|截止|deadline|记得|得去|得做/.test(t);
  const isWish = /以后|想去|想试|想玩|想体验|有机会|下次|总有一天|感兴趣|一直想|好想|希望能/.test(t);

  // 简单提取内容：去掉口头禅前缀
  const clean = text
    .replace(/^(帮我|我想|我要|我需要|我希望|提醒我|记一下|记下来)\s*/u, '')
    .trim();

  if (isTask) return { type: 'task', content: clean };
  if (isWish) return { type: 'wish', content: clean };
  return { type: 'chat', content: clean };
}

// ── 推荐触发：对话开始时检查 ──
function checkRecommendation() {
  // 关键词匹配（实时触发）
  // 由 handleUserSpeech 调用，传入对话文本
}

// ── 生成回复文本 ──
function buildReply(intent, matched) {
  const { type, content } = intent;

  // 如果有语义命中的心愿，优先推荐
  if (matched && matched.length > 0) {
    const m = matched[0];
    recordAndNotify(m.id);
    return `顺便想起来——你之前提过"${m.content}"，现在正是个好时机。`;
  }

  if (type === 'task') {
    const item = Memory.add({ type: 'task', content, tags: extractTags(content) });
    return `记下了。${content ? '"' + content + '"' : '这件事'}我帮你记着。`;
  }

  if (type === 'wish') {
    // 先检查有没有重复
    const existing = Memory.getWishes().find(w =>
      w.content.includes(content.slice(0, 8))
    );
    if (existing) {
      return `这个我已经记着了——"${existing.content}"。到时候会提醒你。`;
    }
    Memory.add({ type: 'wish', content, tags: extractTags(content) });
    return `放进心愿清单了。等合适的时机，我会再提起来。`;
  }

  // chat
  const chatReplies = [
    '嗯，我在听。',
    '明白了。',
    '有意思，继续说。',
    '我知道了。',
  ];
  return chatReplies[Math.floor(Math.random() * chatReplies.length)];
}

function recordAndNotify(id) {
  Memory.recordTrigger(id);
}

// ── 提取简单标签 ──
function extractTags(text) {
  const tagMap = {
    旅行: /去|旅|游|飞|出发|国家|城市|景点/,
    美食: /吃|餐|食|料理|咖啡|甜点|火锅|寿司/,
    运动: /跑|健身|游泳|骑车|爬山|运动|训练/,
    学习: /学|读|课|书|技能|语言|考/,
    工作: /工作|项目|会议|报告|提案|客户|deadline/,
    购物: /买|购|入手|订|预约/,
  };
  return Object.entries(tagMap)
    .filter(([, re]) => re.test(text))
    .map(([tag]) => tag);
}

// ── 唤醒时的开场白（检查今日推荐）──
function getWakeGreeting() {
  const pick = Memory.getDailyPick(3);
  if (pick) {
    Memory.recordTrigger(pick.id);
    if (pick.type === 'wish') {
      return `你好，我在。对了，你之前提过"${pick.content}"——还有兴趣吗？`;
    }
    if (pick.type === 'task') {
      return `你好，我在。记得还有"${pick.content}"这件事。`;
    }
  }
  return '你好，我在。';
}

async function handleUserSpeech(text) {
  if (!text.trim()) return;

  setTranscript(text, false);
  setResponse('', true);
  setStatusLabel('思考中');
  stopWave();

  await new Promise(r => setTimeout(r, 400 + Math.random() * 300));

  // 意图识别
  const intent  = classifyIntent(text);
  // 关键词匹配心愿库
  const matched = intent.type === 'chat' ? Memory.matchByKeyword(text, 1) : [];
  // 生成回复
  const reply   = buildReply(intent, matched);

  setResponse(reply);
  speak(reply);
  setStatusLabel('聆听中');
  startWave();
}

// ── Trigger: center orb ──
const triggerZone = document.getElementById('trigger-zone');

triggerZone.addEventListener('mousedown', () => {
  triggerZone.classList.add('pressing');
  state.holdTimer = setTimeout(() => wake(), 300);
});
triggerZone.addEventListener('mouseup', () => {
  triggerZone.classList.remove('pressing');
  clearTimeout(state.holdTimer);
  wake(); // also fires on click (both mousedown + mouseup complete)
});
triggerZone.addEventListener('mouseleave', () => {
  triggerZone.classList.remove('pressing');
  clearTimeout(state.holdTimer);
});

// Touch support
triggerZone.addEventListener('touchstart', e => {
  e.preventDefault();
  triggerZone.classList.add('pressing');
  state.holdTimer = setTimeout(() => wake(), 300);
});
triggerZone.addEventListener('touchend', e => {
  e.preventDefault();
  triggerZone.classList.remove('pressing');
  clearTimeout(state.holdTimer);
  wake();
});

// ── Keyboard shortcut: Space ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !state.isAwake && e.target.tagName !== 'INPUT') {
    e.preventDefault();
    wake();
  }
  if (e.code === 'Escape' && state.isAwake) dismiss();
});
</script>
